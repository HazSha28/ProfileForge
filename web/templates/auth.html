<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProfileForge — Sign In</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-layout">

    <!-- ── Left panel — branding ─────────────────────────────── -->
    <div class="auth-brand">
      <div class="auth-brand__inner">
        <img src="/static/img/logo.png" alt="ProfileForge"
             class="auth-brand__logo" />
        <h1 class="auth-brand__name">ProfileForge</h1>
        <p class="auth-brand__caption">Intelligent candidate data, unified in seconds.</p>
        <a href="/help" class="auth-brand__help-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/>
          </svg>
          How it works
        </a>
      </div>
    </div>

    <!-- ── Right panel — form ─────────────────────────────────── -->
    <div class="auth-panel">
      <div class="auth-card">

        <!-- Logo shown only on mobile (left panel hidden) -->
        <img src="/static/img/logo.png" alt="ProfileForge"
             class="auth-card__logo-mobile" />

        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab auth-tab--active" id="tab-signin"
                  role="tab" aria-selected="true" aria-controls="panel-signin">
            Sign In
          </button>
          <button class="auth-tab" id="tab-signup"
                  role="tab" aria-selected="false" aria-controls="panel-signup">
            Sign Up
          </button>
        </div>

        <!-- ── Sign In ──────────────────────────────────────── -->
        <div class="auth-form-panel" id="panel-signin" role="tabpanel">
          <h2 class="auth-card__heading">Welcome back</h2>
          <p class="auth-card__sub">Sign in to your ProfileForge account</p>

          <form id="signin-form" novalidate>

            <div class="auth-field">
              <label class="auth-label" for="signin-email">Email address</label>
              <input class="auth-input" type="email" id="signin-email"
                     placeholder="you@example.com" autocomplete="email" />
              <span class="auth-field__error" id="signin-email-err"></span>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="signin-password">
                Password
                <a href="#" class="auth-label__action">Forgot password?</a>
              </label>
              <div class="auth-input-wrap">
                <input class="auth-input" type="password" id="signin-password"
                       placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="auth-eye"
                        aria-label="Toggle password" data-target="signin-password">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <span class="auth-field__error" id="signin-pass-err"></span>
            </div>

            <label class="auth-checkbox">
              <input type="checkbox" id="remember-me" />
              <span class="auth-checkbox__box"></span>
              <span class="auth-checkbox__label">Remember me for 30 days</span>
            </label>

            <div class="auth-alert auth-alert--error" id="signin-error" hidden></div>

            <button type="submit" class="auth-btn" id="signin-btn">
              <span class="auth-btn__label">Sign In</span>
              <span class="auth-btn__spinner" hidden>
                <svg class="auth-spinner" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="currentColor"
                          stroke-width="3" stroke-linecap="round"
                          stroke-dasharray="60" stroke-dashoffset="20"/>
                </svg>
              </span>
            </button>

            <div class="auth-divider"><span>or continue with</span></div>

            <div class="auth-social">
              <button type="button" class="auth-social-btn" data-provider="google">
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
              </button>
              <button type="button" class="auth-social-btn" data-provider="github">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.164 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.026A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.295 2.747-1.026 2.747-1.026.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                GitHub
              </button>
            </div>

          </form>
        </div><!-- /panel-signin -->

        <!-- ── Sign Up ──────────────────────────────────────── -->
        <div class="auth-form-panel" id="panel-signup" role="tabpanel" hidden>
          <h2 class="auth-card__heading">Create account</h2>
          <p class="auth-card__sub">Start transforming candidate profiles today</p>

          <form id="signup-form" novalidate>

            <div class="auth-row">
              <div class="auth-field">
                <label class="auth-label" for="signup-first">First name</label>
                <input class="auth-input" type="text" id="signup-first"
                       placeholder="Jane" autocomplete="given-name" />
                <span class="auth-field__error" id="signup-first-err"></span>
              </div>
              <div class="auth-field">
                <label class="auth-label" for="signup-last">Last name</label>
                <input class="auth-input" type="text" id="signup-last"
                       placeholder="Doe" autocomplete="family-name" />
                <span class="auth-field__error" id="signup-last-err"></span>
              </div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="signup-email">Work email</label>
              <input class="auth-input" type="email" id="signup-email"
                     placeholder="you@company.com" autocomplete="email" />
              <span class="auth-field__error" id="signup-email-err"></span>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="signup-password">Password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" type="password" id="signup-password"
                       placeholder="Min. 8 characters" autocomplete="new-password" />
                <button type="button" class="auth-eye"
                        aria-label="Toggle password" data-target="signup-password">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <div class="pwd-strength">
                <div class="pwd-strength__bar">
                  <div class="pwd-strength__fill" id="pwd-fill"></div>
                </div>
                <span class="pwd-strength__label" id="pwd-label"></span>
              </div>
              <span class="auth-field__error" id="signup-pass-err"></span>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="signup-confirm">Confirm password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" type="password" id="signup-confirm"
                       placeholder="Repeat password" autocomplete="new-password" />
                <button type="button" class="auth-eye"
                        aria-label="Toggle password" data-target="signup-confirm">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <span class="auth-field__error" id="signup-confirm-err"></span>
            </div>

            <label class="auth-checkbox">
              <input type="checkbox" id="agree-terms" />
              <span class="auth-checkbox__box"></span>
              <span class="auth-checkbox__label">
                I agree to the
                <a href="/terms" class="auth-link">Terms of Service</a> and
                <a href="/privacy" class="auth-link">Privacy Policy</a>
              </span>
            </label>

            <div class="auth-alert auth-alert--error"   id="signup-error"   hidden></div>
            <div class="auth-alert auth-alert--success" id="signup-success" hidden></div>

            <button type="submit" class="auth-btn" id="signup-btn">
              <span class="auth-btn__label">Create Account</span>
              <span class="auth-btn__spinner" hidden>
                <svg class="auth-spinner" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="currentColor"
                          stroke-width="3" stroke-linecap="round"
                          stroke-dasharray="60" stroke-dashoffset="20"/>
                </svg>
              </span>
            </button>

          </form>
        </div><!-- /panel-signup -->

      </div><!-- /.auth-card -->
    </div><!-- /.auth-panel -->

  </div><!-- /.auth-layout -->

  <script src="/static/js/auth.js"></script>
</body>
</html>
